<!DOCTYPE html>
<html>

<head>
  <title>WhatsApp Notification Sound Changer</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
  <div id="titleBar">
    <h1>WhatsApp Notification Sound Changer</h1>
  </div>
  
  <p>Play current custom sound:
    <audio controls id="audioElement">
      Your browser does not support the audio tag.
    </audio>
  </p>
  <div id="buttonsContainer">
    <button id="stopSoundButton" style="display:none"><i class="bi bi-stop-fill"></i> Stop sound (if it is playing)</button>
    <label for="audioFileUpload"><i class="bi bi-upload"></i> Upload new custom sound</label>
  </div>
  <input type="file" accept="audio/*" id="audioFileUpload"/>
  <p id="message"></p>
  <hr />
  <p>Enjoying the extension? Consider <a href="https://mejia.dev/coffee" target="_blank">buying me a coffee</a></p>
  <script src="scripts/popup.js"></script>
</body>

</html>
